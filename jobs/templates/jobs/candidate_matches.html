{% extends "base.html" %}

{% block title %}Candidate Matches{% endblock %}

{% block content %}
<h2 class="h4 mb-3">Recommended Jobs for {{ candidate.full_name }}</h2>

{% for job, score in results %}
    <div class="card mb-3">
        <div class="card-body">
            <h3 class="h5">{{ job.title }}</h3>
            <p class="mb-1">Match Score: {{ score|floatformat:2 }}</p>
            <a href="{% url 'apply_job' job.id %}" class="btn btn-sm btn-primary">Apply</a>
        </div>
    </div>
{% empty %}
    <div class="alert alert-info">No matches found.</div>
{% endfor %}
{% endblock %}
